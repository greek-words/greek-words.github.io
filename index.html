<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek A2 Vocabulary</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #f0f4f8;
    color: #1a1a2e;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #1a5276, #2e86c1);
    color: #fff;
    padding: 28px 24px 20px;
    text-align: center;
  }
  .header h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
  .header p { font-size: 14px; opacity: 0.85; }

  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 16px 24px;
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .controls button, .controls select {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    background: #fff;
    color: #334155;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .controls button:hover { background: #f1f5f9; }
  .controls button.active {
    background: #1a5276;
    color: #fff;
    border-color: #1a5276;
  }
  .controls input {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    font-size: 13px;
    width: 200px;
    outline: none;
  }
  .controls input:focus { border-color: #2e86c1; }

  .stats {
    text-align: center;
    padding: 10px;
    font-size: 13px;
    color: #64748b;
  }

  /* Card mode */
  .card-container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 32px 24px;
    min-height: 400px;
  }
  .card {
    width: 420px;
    max-width: 90vw;
    height: 300px;
    perspective: 1000px;
    cursor: pointer;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s;
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .card-front {
    background: #fff;
  }
  .card-back {
    background: linear-gradient(135deg, #1a5276, #2e86c1);
    color: #fff;
    transform: rotateY(180deg);
  }
  .card-greek {
    font-size: 42px;
    font-weight: 700;
    margin-bottom: 12px;
    color: #1a5276;
  }
  .card-translit {
    font-size: 18px;
    color: #64748b;
    font-style: italic;
  }
  .card-back .card-russian {
    font-size: 32px;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .card-back .card-category {
    font-size: 13px;
    opacity: 0.7;
    background: rgba(255,255,255,0.15);
    padding: 4px 12px;
    border-radius: 20px;
  }
  .card-nav {
    display: flex;
    gap: 16px;
    justify-content: center;
    padding: 0 24px 24px;
  }
  .card-nav button {
    padding: 12px 28px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .card-nav .prev { background: #e2e8f0; color: #334155; }
  .card-nav .prev:hover { background: #cbd5e1; }
  .card-nav .next { background: #1a5276; color: #fff; }
  .card-nav .next:hover { background: #154360; }
  .card-nav .know {
    background: #16a34a;
    color: #fff;
  }
  .card-nav .know:hover { background: #15803d; }
  .card-nav .dont-know {
    background: #dc2626;
    color: #fff;
  }
  .card-nav .dont-know:hover { background: #b91c1c; }
  .card-counter {
    text-align: center;
    font-size: 14px;
    color: #64748b;
    margin-bottom: 16px;
  }

  /* List mode */
  .word-list {
    max-width: 800px;
    margin: 0 auto;
    padding: 16px 24px 40px;
  }
  .word-item {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    background: #fff;
    border-radius: 12px;
    margin-bottom: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    transition: transform 0.15s;
    cursor: pointer;
  }
  .word-item:hover { transform: translateX(4px); }
  .word-item .greek {
    font-size: 20px;
    font-weight: 700;
    color: #1a5276;
    min-width: 200px;
  }
  .word-item .translit {
    font-size: 14px;
    color: #94a3b8;
    font-style: italic;
    min-width: 160px;
  }
  .word-item .russian {
    font-size: 16px;
    color: #334155;
    flex: 1;
  }
  .word-item .cat {
    font-size: 11px;
    color: #64748b;
    background: #f1f5f9;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .word-item .russian.hidden { color: transparent; background: #e2e8f0; border-radius: 4px; user-select: none; }

  /* Quiz mode */
  .quiz-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
  }
  .quiz-word {
    font-size: 48px;
    font-weight: 700;
    color: #1a5276;
    margin-bottom: 8px;
  }
  .quiz-translit {
    font-size: 18px;
    color: #94a3b8;
    font-style: italic;
    margin-bottom: 32px;
  }
  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 420px;
    max-width: 90vw;
  }
  .quiz-option {
    padding: 16px;
    border-radius: 12px;
    border: 2px solid #e2e8f0;
    background: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .quiz-option:hover { border-color: #2e86c1; background: #f0f9ff; }
  .quiz-option.correct { border-color: #16a34a; background: #f0fdf4; color: #16a34a; font-weight: 600; }
  .quiz-option.wrong { border-color: #dc2626; background: #fef2f2; color: #dc2626; }
  .quiz-score {
    margin-top: 24px;
    font-size: 15px;
    color: #64748b;
  }

  .hidden { display: none !important; }

  /* Progress bar */
  .progress-wrap {
    padding: 12px 24px 4px;
    background: linear-gradient(135deg, #1a5276, #2e86c1);
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 6px;
  }
  .progress-bar {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4ade80, #22d3ee);
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  /* Learned indicator in cards */
  .card-learned-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    background: #16a34a;
    color: #fff;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }

  /* Learned indicator in list */
  .word-item.learned {
    border-left: 4px solid #16a34a;
  }
  .word-item .learned-check {
    color: #16a34a;
    font-size: 18px;
    margin-left: 8px;
    flex-shrink: 0;
  }

  /* Celebration overlay */
  .celebration {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    animation: celebFadeIn 0.3s ease;
  }
  @keyframes celebFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .celebration canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .celebration .celeb-msg {
    position: relative;
    z-index: 1;
    background: #fff;
    border-radius: 24px;
    padding: 40px 48px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    animation: celebPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes celebPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .celeb-msg .celeb-icon { font-size: 64px; margin-bottom: 12px; }
  .celeb-msg .celeb-count { font-size: 42px; font-weight: 800; color: #1a5276; }
  .celeb-msg .celeb-text { font-size: 18px; color: #64748b; margin-top: 8px; }
  .celeb-msg .celeb-greek { font-size: 22px; color: #2e86c1; font-weight: 600; margin-top: 4px; }

  /* Reset button */
  .reset-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.7);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

  @media (max-width: 768px) {
    .header { padding: 20px 16px 16px; }
    .header h1 { font-size: 22px; }
    .progress-wrap { padding: 10px 16px 4px; }
    .controls { padding: 12px 12px; gap: 6px; }
    .controls button, .controls select { padding: 7px 12px; font-size: 12px; }
    .controls input { width: 100%; order: 10; }
    .stats { font-size: 12px; }
    .card-container { padding: 20px 12px; min-height: 320px; }
    .card { height: 260px; }
    .card-greek { font-size: 32px; }
    .card-translit { font-size: 15px; }
    .card-back .card-russian { font-size: 24px; }
    .card-nav { gap: 8px; flex-wrap: wrap; justify-content: center; padding: 0 12px 20px; }
    .card-nav button { padding: 10px 18px; font-size: 14px; }
    .messages { padding: 16px 12px; }
    .word-list { padding: 12px 12px 40px; }
    .word-item { flex-wrap: wrap; gap: 4px; padding: 12px 14px; }
    .word-item .greek { min-width: auto; flex: 1 1 100%; font-size: 18px; }
    .word-item .translit { min-width: auto; font-size: 13px; }
    .word-item .russian { font-size: 14px; }
    .quiz-word { font-size: 36px; }
    .quiz-translit { font-size: 16px; margin-bottom: 24px; }
    .quiz-options { grid-template-columns: 1fr; width: 100%; }
    .quiz-option { padding: 14px; font-size: 15px; }
    .celeb-msg { padding: 28px 24px; margin: 0 16px; }
    .celeb-msg .celeb-count { font-size: 32px; }
    .celeb-msg .celeb-icon { font-size: 48px; }
  }

  @media (max-width: 380px) {
    .header h1 { font-size: 19px; }
    .card { height: 230px; }
    .card-greek { font-size: 26px; }
    .card-back .card-russian { font-size: 20px; }
    .card-nav button { padding: 9px 14px; font-size: 13px; }
    .quiz-word { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Ελληνικά A2</h1>
  <p>Греческие слова уровня A2 — учи, повторяй, проверяй</p>
  <div class="progress-wrap">
    <div class="progress-info">
      <span id="progressText">Выучено: 0 / 963</span>
      <span><button class="reset-btn" onclick="resetProgress()">Сбросить</button></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</div>

<div class="controls">
  <button class="active" onclick="setMode('cards')" id="btn-cards">Карточки</button>
  <button onclick="setMode('list')" id="btn-list">Список</button>
  <button onclick="setMode('quiz')" id="btn-quiz">Тест</button>
  <select id="catFilter" onchange="filterCategory()">
    <option value="all">Все темы</option>
  </select>
  <input type="text" id="search" placeholder="Поиск..." oninput="filterSearch()">
  <button onclick="shuffle()">Перемешать</button>
</div>

<div class="stats" id="stats"></div>

<!-- Cards -->
<div id="cards-mode">
  <div class="card-counter" id="cardCounter"></div>
  <div class="card-container">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-inner">
        <div class="card-front">
          <div class="card-greek" id="cGreek"></div>
          <div class="card-translit" id="cTranslit"></div>
        </div>
        <div class="card-back">
          <div class="card-russian" id="cRussian"></div>
          <div class="card-category" id="cCat"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="card-nav">
    <button class="dont-know" onclick="markWord(false)">Не знаю</button>
    <button class="prev" onclick="prevCard()">Назад</button>
    <button class="next" onclick="nextCard()">Далее</button>
    <button class="know" onclick="markWord(true)">Знаю</button>
  </div>
</div>

<!-- List -->
<div id="list-mode" class="hidden">
  <div class="word-list" id="wordList"></div>
</div>

<!-- Quiz -->
<div id="quiz-mode" class="hidden">
  <div class="quiz-container">
    <div class="quiz-word" id="qWord"></div>
    <div class="quiz-translit" id="qTranslit"></div>
    <div class="quiz-options" id="qOptions"></div>
    <div class="quiz-score" id="qScore"></div>
  </div>
</div>

let filtered = [...words];
let cardIndex = 0;
let mode = 'cards';

// ===== PROGRESS (localStorage with safety) =====
const STORAGE_KEY = 'greek_a2_learned';
let learned = new Set();

// Safe localStorage wrapper
function storageAvailable() {
  try {
    const t = '__test__';
    localStorage.setItem(t, t);
    localStorage.removeItem(t);
    return true;
  } catch { return false; }
}

function getStorageSize() {
  if (!storageAvailable()) return { used: 0, ourApp: 0 };
  let total = 0;
  let ourApp = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    const val = localStorage.getItem(key);
    const size = (key.length + val.length) * 2; // UTF-16
    total += size;
    if (key === STORAGE_KEY) ourApp = size;
  }
  return { used: total, ourApp };
}

// Load saved progress
try {
  if (storageAvailable()) {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) learned = new Set(JSON.parse(saved));
  }
} catch { learned = new Set(); }

function saveLearned() {
  if (!storageAvailable()) return;
  try {
    const data = JSON.stringify([...learned]);
    // Our data should never exceed 100KB (963 words * ~30 chars max = ~30KB)
    if (data.length * 2 > 100 * 1024) {
      console.warn('Greek A2: localStorage data too large, skipping save');
      return;
    }
    localStorage.setItem(STORAGE_KEY, data);
  } catch (e) {
    // QuotaExceededError — localStorage is full
    console.warn('Greek A2: localStorage full', e);
    alert('localStorage переполнен. Прогресс не может быть сохранён. Попробуйте очистить данные других сайтов.');
  }
}

function isLearned(w) { return learned.has(w.gr); }

function learnWord(w) {
  if (learned.has(w.gr)) return;
  learned.add(w.gr);
  saveLearned();
  updateProgress();
  // Check milestone every 10
  if (learned.size % 10 === 0) {
    celebrate(learned.size);
  }
}

function unlearnWord(w) {
  learned.delete(w.gr);
  saveLearned();
  updateProgress();
}

function resetProgress() {
  if (!confirm('Сбросить весь прогресс? Все выученные слова будут обнулены.')) return;
  learned.clear();
  saveLearned();
  updateProgress();
  if (mode === 'cards') showCard();
  if (mode === 'list') renderList();
}

function updateProgress() {
  const total = words.length;
  const count = learned.size;
  const pct = total ? (count / total * 100) : 0;
  document.getElementById('progressText').textContent = `Выучено: ${count} / ${total}`;
  document.getElementById('progressFill').style.width = pct.toFixed(1) + '%';
}

function celebrate(count) {
  const ms = milestones.find(m => m.at === count) || { icon: "🎉", text: `${count} слов!`, greek: "Μπράβο!" };

  const overlay = document.createElement('div');
  overlay.className = 'celebration';
  overlay.innerHTML = `
    <canvas id="confettiCanvas"></canvas>
    <div class="celeb-msg">
      <div class="celeb-icon">${ms.icon}</div>
      <div class="celeb-count">${count} слов</div>
      <div class="celeb-text">${ms.text}</div>
      <div class="celeb-greek">${ms.greek}</div>
    </div>
  `;
  document.body.appendChild(overlay);

  // Confetti
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bff','#ff9f43','#54a0ff','#5f27cd'];
  for (let i = 0; i < 150; i++) {
    particles.push({
      x: canvas.width / 2 + (Math.random() - 0.5) * 200,
      y: canvas.height / 2,
      vx: (Math.random() - 0.5) * 20,
      vy: Math.random() * -18 - 5,
      size: Math.random() * 8 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 15,
      gravity: 0.4,
      life: 1,
    });
  }

  let frame = 0;
  function animateConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      p.x += p.vx;
      p.vy += p.gravity;
      p.y += p.vy;
      p.vx *= 0.98;
      p.rotation += p.rotSpeed;
      p.life -= 0.008;
      if (p.life <= 0) return;
      alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
      ctx.restore();
    });
    frame++;
    if (alive && frame < 180) requestAnimationFrame(animateConfetti);
  }
  animateConfetti();

  setTimeout(() => {
    overlay.style.transition = 'opacity 0.5s';
    overlay.style.opacity = '0';
    setTimeout(() => overlay.remove(), 500);
  }, 3000);
}

// ===== INIT CATEGORIES =====

function setMode(m) {
  mode = m;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m)?.classList.add('active');
  document.getElementById('cards-mode').classList.toggle('hidden', m !== 'cards');
  document.getElementById('list-mode').classList.toggle('hidden', m !== 'list');
  document.getElementById('quiz-mode').classList.toggle('hidden', m !== 'quiz');
  if (m === 'cards') showCard();
  if (m === 'list') renderList();
  if (m === 'quiz') nextQuiz();
  updateStats();
}

function updateStats() {
  const learnedInFilter = filtered.filter(w => isLearned(w)).length;
  document.getElementById('stats').textContent = `Показано: ${filtered.length} из ${words.length} | Выучено в этой теме: ${learnedInFilter}`;
}

function filterCategory() {
  const cat = catSelect.value;
  const search = document.getElementById('search').value.toLowerCase();
  filtered = words.filter(w => {
    const catMatch = cat === 'all' || w.cat === cat;
    const searchMatch = !search || w.gr.toLowerCase().includes(search) || w.ru.toLowerCase().includes(search) || w.tr.toLowerCase().includes(search);
    return catMatch && searchMatch;
  });
  cardIndex = 0;
  if (mode === 'cards') showCard();
  if (mode === 'list') renderList();
  if (mode === 'quiz') nextQuiz();
  updateStats();
}

function filterSearch() { filterCategory(); }

function shuffle() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  cardIndex = 0;
  if (mode === 'cards') showCard();
  if (mode === 'list') renderList();
  if (mode === 'quiz') nextQuiz();
}

// ===== CARDS =====
function showCard() {
  if (!filtered.length) return;
  const w = filtered[cardIndex];
  document.getElementById('cGreek').textContent = w.gr;
  document.getElementById('cTranslit').textContent = w.tr;
  document.getElementById('cRussian').textContent = w.ru;
  document.getElementById('cCat').textContent = w.cat;
  document.getElementById('card').classList.remove('flipped');

  // Show learned badge
  const front = document.querySelector('.card-front');
  const existingBadge = front.querySelector('.card-learned-badge');
  if (existingBadge) existingBadge.remove();
  if (isLearned(w)) {
    const badge = document.createElement('div');
    badge.className = 'card-learned-badge';
    badge.textContent = 'Выучено';
    front.appendChild(badge);
  }

  document.getElementById('cardCounter').textContent = `${cardIndex + 1} / ${filtered.length}`;
}

function flipCard() {
  document.getElementById('card').classList.toggle('flipped');
}

function nextCard() {
  cardIndex = (cardIndex + 1) % filtered.length;
  showCard();
}

function prevCard() {
  cardIndex = (cardIndex - 1 + filtered.length) % filtered.length;
  showCard();
}

function markWord(known) {
  const w = filtered[cardIndex];
  if (known) {
    learnWord(w);
  } else {
    unlearnWord(w);
  }
  updateStats();
  nextCard();
}

// ===== LIST =====
function renderList() {
  const list = document.getElementById('wordList');
  list.innerHTML = '';
  filtered.forEach((w, i) => {
    const isL = isLearned(w);
    const div = document.createElement('div');
    div.className = 'word-item' + (isL ? ' learned' : '');
    div.innerHTML = `
      <span class="greek">${w.gr}</span>
      <span class="translit">${w.tr}</span>
      <span class="russian ${hideTranslation ? 'hidden' : ''}" data-i="${i}">${w.ru}</span>
      <span class="cat">${w.cat}</span>
      <span class="learned-check">${isL ? '✓' : ''}</span>
    `;
    div.onclick = () => {
      const rus = div.querySelector('.russian');
      rus.classList.toggle('hidden');
    };
    list.appendChild(div);
  });
}

// ===== QUIZ =====
function nextQuiz() {
  if (filtered.length < 4) return;
  const idx = Math.floor(Math.random() * filtered.length);
  const correct = filtered[idx];
  const opts = [correct];
  while (opts.length < 4) {
    const r = words[Math.floor(Math.random() * words.length)];
    if (!opts.find(o => o.ru === r.ru)) opts.push(r);
  }
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }

  document.getElementById('qWord').textContent = correct.gr;
  document.getElementById('qTranslit').textContent = correct.tr;
  const optDiv = document.getElementById('qOptions');
  optDiv.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = o.ru;
    btn.onclick = () => {
      quizScore.total++;
      if (o.ru === correct.ru) {
        quizScore.correct++;
        btn.classList.add('correct');
        // Mark as learned on correct quiz answer
        learnWord(correct);
        updateStats();
      } else {
        btn.classList.add('wrong');
        optDiv.querySelectorAll('button').forEach(b => {
          if (b.textContent === correct.ru) b.classList.add('correct');
        });
      }
      document.getElementById('qScore').textContent = `Верно: ${quizScore.correct} / ${quizScore.total}`;
      setTimeout(nextQuiz, 1200);
    };
    optDiv.appendChild(btn);
  });
}
